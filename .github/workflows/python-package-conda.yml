name: Python Package using UV

on: [push]

jobs:
  build-linux:
    name: python
    runs-on: ubuntu-latest
    strategy:
       max-parallel: 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: uv run pytest
