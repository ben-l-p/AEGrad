[project]
name = "aegrad"
version = "0.1.0"
description = "Add your description here"
requires-python = ">=3.13"
dependencies = [
    "diffrax==0.7.0",
    "equinox==0.13.2",
    "jax==0.8.2",
    "pytest==9.0.2",
    "ruff==0.14.10",
    "vtk==9.5.2",
